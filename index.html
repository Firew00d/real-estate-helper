<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 계약서 AI 분석</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 20px; }
  .subtitle { font-size: 13px; color: #666; margin-left: auto; }

  .container { max-width: 780px; margin: 0 auto; padding: 2rem 1rem; }

  .upload-card {
    background: #fff;
    border: 1.5px dashed #ccc;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-card:hover { border-color: #4a7cf7; background: #f7faff; }
  .upload-card.dragover { border-color: #4a7cf7; background: #eef3ff; }
  .upload-icon { font-size: 48px; margin-bottom: 1rem; }
  .upload-card h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .upload-card p { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  #file-input { display: none; }

  .btn {
    display: inline-block;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #4a7cf7; color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

  .file-list { margin-top: 1.5rem; }
  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f7f7f5;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .file-icon { font-size: 20px; }
  .file-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { color: #999; font-size: 12px; }
  .file-remove { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; padding: 2px 6px; }
  .file-remove:hover { color: #e74c3c; }

  .analyze-section { margin-top: 1.5rem; text-align: center; }

  .result-card {
    background: #fff;
    border-radius: 16px;
    padding: 1.75rem;
    margin-top: 1.75rem;
    border: 1px solid #e8e8e8;
    display: none;
  }
  .result-card.show { display: block; }
  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #f0f0f0;
  }
  .result-header h3 { font-size: 16px; font-weight: 600; }

  .risk-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-left: auto;
  }
  .risk-safe { background: #e6f7ec; color: #1a7f44; }
  .risk-caution { background: #fff7e0; color: #996600; }
  .risk-danger { background: #fdecea; color: #c0392b; }

  .result-body { font-size: 14.5px; line-height: 1.8; white-space: pre-wrap; color: #333; }

  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    margin-top: 1.75rem;
  }
  .loading.show { display: block; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e0e0e0;
    border-top-color: #4a7cf7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: #666; }

  .api-key-section {
    background: #fff;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    border: 1px solid #e8e8e8;
  }
  .api-key-section label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
  .api-key-section input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    font-family: monospace;
  }
  .api-key-section input:focus { border-color: #4a7cf7; }
  .api-key-section .hint { font-size: 12px; color: #999; margin-top: 5px; }

  .error-msg {
    background: #fdecea;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #c0392b;
    margin-top: 1.25rem;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<header>
  <span>🏠</span>
  <h1>부동산 계약서 AI 분석</h1>
  <span class="subtitle">계약서를 올리면 AI가 위험 요소를 분석해드려요</span>
</header>

<div class="container">

  <!-- API Key 입력 -->
  <div class="api-key-section">
    <label>Anthropic API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
    <p class="hint">🔒 API 키는 브라우저에만 저장되며 서버로 전송되지 않아요. <a href="https://console.anthropic.com/settings/keys" target="_blank">API 키 발급받기 →</a></p>
  </div>

  <!-- 파일 업로드 -->
  <div class="upload-card" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📄</div>
    <h2>PDF 파일을 드래그하거나 클릭해서 업로드</h2>
    <p>등기부등본, 건축물대장, 임대차 계약서 등</p>
    <span class="btn btn-primary" onclick="event.stopPropagation(); document.getElementById('file-input').click()">파일 선택하기</span>
    <input type="file" id="file-input" accept=".pdf" multiple />
  </div>

  <div class="file-list" id="file-list"></div>

  <div class="analyze-section">
    <button class="btn btn-primary" id="analyze-btn" disabled onclick="analyze()">🔍 AI 분석 시작하기</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>AI가 계약서를 꼼꼼히 분석 중이에요...<br>잠시만 기다려주세요 (30초~1분 소요)</p>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <span>📋</span>
      <h3>분석 결과</h3>
      <span class="risk-badge" id="risk-badge"></span>
    </div>
    <div class="result-body" id="result-body"></div>
  </div>

</div>

<script>
const files = [];

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

function renderFileList() {
  const list = document.getElementById('file-list');
  list.innerHTML = files.map((f, i) => `
    <div class="file-item">
      <span class="file-icon">📄</span>
      <span class="file-name">${f.name}</span>
      <span class="file-size">${formatSize(f.size)}</span>
      <button class="file-remove" onclick="removeFile(${i})">✕</button>
    </div>
  `).join('');
  document.getElementById('analyze-btn').disabled = files.length === 0;
}

function removeFile(i) {
  files.splice(i, 1);
  renderFileList();
}

document.getElementById('file-input').addEventListener('change', (e) => {
  for (const f of e.target.files) {
    if (f.type === 'application/pdf') files.push(f);
  }
  e.target.value = '';
  renderFileList();
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', (e) => {
  e.preventDefault();
  dz.classList.remove('dragover');
  for (const f of e.dataTransfer.files) {
    if (f.type === 'application/pdf') files.push(f);
  }
  renderFileList();
});

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패'));
    r.readAsDataURL(file);
  });
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('error-msg').classList.remove('show');
}

async function analyze() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { showError('API 키를 입력해주세요.'); return; }
  if (files.length === 0) { showError('분석할 PDF 파일을 업로드해주세요.'); return; }

  hideError();
  document.getElementById('loading').classList.add('show');
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('analyze-btn').disabled = true;

  try {
    const contentArr = [];
    for (const file of files) {
      const b64 = await fileToBase64(file);
      contentArr.push({
        type: 'document',
        source: { type: 'base64', media_type: 'application/pdf', data: b64 }
      });
    }

    contentArr.push({
      type: 'text',
      text: `당신은 대한민국 부동산 계약 전문 AI 어시스턴트입니다.
첨부된 문서들을 분석하여 아래 형식으로 답변해주세요.

## 📊 종합 판단
이 매물/계약이 안전한지 위험한지 한 줄로 요약

## ⚠️ 위험 요소
발견된 위험 요소를 항목별로 설명 (없으면 "특별한 위험 요소 없음")

## ✅ 괜찮은 이유
계약을 진행해도 되는 근거 (해당하는 경우)

## 📋 추가로 확인해야 할 서류
제출된 서류 외에 확인이 필요한 서류 목록

## 📝 필수 특약사항 추천
이 계약에 반드시 포함시켜야 할 특약사항

## 💡 기타 조언
추가로 알아두면 좋을 사항

마지막 줄에 반드시 다음 중 하나를 적어주세요: [위험도: 안전] 또는 [위험도: 주의] 또는 [위험도: 위험]`
    });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 2000,
        messages: [{ role: 'user', content: contentArr }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || `API 오류 (${resp.status})`);
    }

    const data = await resp.json();
    const text = data.content.map(c => c.text || '').join('');

    let riskLevel = '분석완료';
    let riskClass = '';
    if (text.includes('[위험도: 안전]')) { riskLevel = '✅ 안전'; riskClass = 'risk-safe'; }
    else if (text.includes('[위험도: 주의]')) { riskLevel = '⚠️ 주의 필요'; riskClass = 'risk-caution'; }
    else if (text.includes('[위험도: 위험]')) { riskLevel = '🚨 위험'; riskClass = 'risk-danger'; }

    const badge = document.getElementById('risk-badge');
    badge.textContent = riskLevel;
    badge.className = 'risk-badge ' + riskClass;

    const cleanText = text.replace(/\[위험도: (안전|주의|위험)\]/g, '').trim();
    document.getElementById('result-body').textContent = cleanText;
    document.getElementById('result-card').classList.add('show');

  } catch (e) {
    showError('분석 중 오류가 발생했어요: ' + e.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('analyze-btn').disabled = false;
  }
}
</script>
</body>
</html>
